name: CI macOS

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

defaults:
  run:
    shell: bash

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build-rhi:
    name: ${{ matrix.name }}
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: QRhi (macOS)
            text: OFF
            benchmark: OFF
          - name: QRhi+Text (macOS)
            text: ON
            benchmark: ON
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: '6.10.1'
          arch: 'clang_64'
          archives: 'qtbase qtdeclarative'
          modules: 'qtshadertools'
          cache: 'true'

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DVNM_PLOT_ENABLE_TEXT=${{ matrix.text }} \
            -DVNM_PLOT_BUILD_TESTS=ON \
            -DVNM_PLOT_BUILD_BENCHMARK=${{ matrix.benchmark }} \
            -DVNM_PLOT_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --config ${CMAKE_BUILD_TYPE}

      - name: Run tests
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure

      - name: Build summary
        run: |
          echo "=== ${{ matrix.name }} completed ==="
          find build -name '*.a' -print || echo "Static libraries built"
