name: CI Linux

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

defaults:
  run:
    shell: bash

env:
  CMAKE_BUILD_TYPE: Release
  LINUX_SYSTEM_DEPS: >-
    libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev
    libxi-dev libxext-dev libwayland-dev libxkbcommon-dev libvulkan-dev

jobs:
  build-rhi:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: QRhi (Linux)
            text: OFF
            benchmark: OFF
            examples: OFF
          - name: QRhi+Text (Linux)
            text: ON
            benchmark: ON
            examples: ON
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${LINUX_SYSTEM_DEPS}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: '6.10.1'
          arch: 'linux_gcc_64'
          archives: 'icu qtbase qtdeclarative'
          modules: 'qtshadertools'
          cache: 'true'

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DVNM_PLOT_ENABLE_TEXT=${{ matrix.text }} \
            -DVNM_PLOT_BUILD_TESTS=ON \
            -DVNM_PLOT_BUILD_BENCHMARK=${{ matrix.benchmark }} \
            -DVNM_PLOT_BUILD_EXAMPLES=${{ matrix.examples }} \
            -DVNM_PLOT_BUILD_FUNCTION_PLOTTER=OFF

      - name: Build
        run: cmake --build build --config ${CMAKE_BUILD_TYPE}

      - name: Run tests
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure

      - name: Package checkpoint evidence
        if: always() && matrix.benchmark == 'ON'
        continue-on-error: true
        run: >-
          python benchmark/tools/run_gate.py --source-root . --build-dir build
          --mode ci-retain --upstream-status "${{ job.status }}"

      - name: Retain benchmark gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-gate-linux-${{ matrix.text }}
          path: build/gate-artifacts
          if-no-files-found: ignore
          retention-days: 30

      - name: Build summary
        run: |
          echo "=== ${{ matrix.name }} completed ==="
          ls -la build/*.a 2>/dev/null || echo "Static libraries in build directory"
