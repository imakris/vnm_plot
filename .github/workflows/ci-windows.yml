name: CI Windows

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

defaults:
  run:
    shell: bash

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build-rhi:
    name: ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: QRhi (Windows)
            text: OFF
            benchmark: OFF
          - name: QRhi+Text (Windows)
            text: ON
            benchmark: ON
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          cache: 'true'

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE="$env:CMAKE_BUILD_TYPE" `
            -DVNM_PLOT_ENABLE_TEXT=${{ matrix.text }} `
            -DVNM_PLOT_BUILD_TESTS=ON `
            -DVNM_PLOT_BUILD_BENCHMARK=${{ matrix.benchmark }} `
            -DVNM_PLOT_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --config "$env:CMAKE_BUILD_TYPE"

      - name: Run tests
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure -C "$env:CMAKE_BUILD_TYPE"

      - name: Build summary
        run: |
          echo "=== ${{ matrix.name }} completed ==="
          $libs = Get-ChildItem -Path build -Filter *.lib -Recurse -ErrorAction SilentlyContinue
          if ($libs) {
            $libs | Select-Object -ExpandProperty FullName
          } else {
            echo "Libraries built successfully"
          }
